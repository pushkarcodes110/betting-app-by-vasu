version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bettingdb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - betting_network

  web:
    build: .
    volumes:
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bettingdb}
      - POSTGRES_DB=${POSTGRES_DB:-bettingdb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-60}
      - GUNICORN_KEEPALIVE=${GUNICORN_KEEPALIVE:-2}
      - GUNICORN_MAX_REQUESTS=${GUNICORN_MAX_REQUESTS:-500}
      - GUNICORN_MAX_REQUESTS_JITTER=${GUNICORN_MAX_REQUESTS_JITTER:-50}
      - GUNICORN_ACCESS_LOG=${GUNICORN_ACCESS_LOG:-false}
      - DB_CONN_MAX_AGE=${DB_CONN_MAX_AGE:-60}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - betting_network

volumes:
  postgres_data:
  media_volume:

networks:
  betting_network:
    driver: bridge
